version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: huashu-postgres
    environment:
      POSTGRES_USER: huashu
      POSTGRES_PASSWORD: huashu_password
      POSTGRES_DB: huashu_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huashu -d huashu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build: .
    container_name: huashu-backend
    environment:
      DATABASE_URL: postgresql://huashu:huashu_password@postgres:5432/huashu_db?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && node prisma/seed.js && node src/index.js"

volumes:
  postgres_data:
