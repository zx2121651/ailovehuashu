version: '3.8'

# 完整服务编排 - 包含后端、数据库、前端和管理后台

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: huashu-postgres
    environment:
      POSTGRES_USER: huashu
      POSTGRES_PASSWORD: huashu_password
      POSTGRES_DB: huashu_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huashu -d huashu_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - huashu-network

  # 后端 API 服务
  backend:
    build: ./huashu-backend
    container_name: huashu-backend
    environment:
      DATABASE_URL: postgresql://huashu:huashu_password@postgres:5432/huashu_db?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && node prisma/seed.js && node src/index.js"
    networks:
      - huashu-network

  # 前端用户端（使用 Nginx 托管生产构建）
  frontend:
    build:
      context: ./huashu-app
      dockerfile: Dockerfile
    container_name: huashu-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - huashu-network

  # 管理后台（使用 Nginx 托管生产构建）
  admin:
    build:
      context: ./huashu-admin
      dockerfile: Dockerfile
    container_name: huashu-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - huashu-network

volumes:
  postgres_data:

networks:
  huashu-network:
    driver: bridge
